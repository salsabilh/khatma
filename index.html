<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Qur'an Khatma Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <img class="header-img" src="prgm-khatm.jpg">
    <div class="tabs">
      <button class="tab" onclick="setTab(this, 'review')"><a href="review.html">المراجعة</a></button>
      <button class="tab" onclick="setTab(this, 'memorize')">الحفظ</button>
      <button class="tab active" onclick="setTab(this, 'wird')">الورد</button>
    </div>

    <!-- PROGRESS SYSTEM -->
    <div class="progress-section">
      <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <p id="progressText">0% مكتمل</p>
      <div class="stats">
        <p>🔥 مواظبة: <span id="streak">0</span> أيام</p>
        <p>تم الإنجاز: <span id="done">0</span></p>
        <p>المتبقي: <span id="left">60</span></p>
      </div>
    </div>

    <div class="tracker">
      <div class="column left">
        <h2>💙النصف الثاني💙</h2>
        <div class="grid" id="leftGrid"></div>
      </div>
      <div class="column right">
        <h2>💙النصف الأول💙</h2>
        <div class="grid" id="rightGrid"></div>
      </div>
    </div><br><br>

    <button id="resetBtn">إعادة تعيين الكل</button>

    <footer>
      <span>ألا بذكر الله تطمئن القلوب</span>
      <p>Made with salsabil — Khatma 💙.</p>
    </footer>
  </div>

  <!-- Hizb modal -->
  <div id="athmanModal" class="modal-overlay">
    <div class="modal-box">
      <div class="modal-header">
        <div>
          <h3 id="modalTitle"></h3>
          <p id="modalRange"></p>
        </div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div id="athmanList" class="athman-list"></div>
    </div>
  </div>

  <!-- 🎉 Khatma congratulations popup -->
  <div id="khatmaModal" class="modal-overlay" style="display:none;">
    <div class="khatma-box">
      <div class="khatma-stars">✨🌙✨</div>
      <h2 class="khatma-title">ختمتِ القرآن الكريم!</h2>
      <div id="khatmaText" class="khatma-text"></div>
      <button class="khatma-btn" onclick="closeKhatmaModal()">جزاكِ الله خيرًا 💙</button>
    </div>
  </div>

  <!-- 💬 Motivational toast -->
  <div id="toast" class="toast"></div>

  <script src="script.js"></script>
</body>
</html>
