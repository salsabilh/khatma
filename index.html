<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🌸Qur'an Khatma Tracker🌸</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <img class="header-img" src="prgm-khatm.jpg">
    <div class="tracker">
      <div class="column left">
        <h2>💙النصف الثاني💙</h2>
        <div class="grid" id="leftGrid"></div>
      </div>
      <div class="column right">
        
        <h2>💙النصف الأول💙</h2>
        <div class="grid" id="rightGrid"></div>
      </div>
    </div><br><br>
    <button id="resetBtn"> إعادة تعيين الكل</button>
    <footer>
      <p>Made with salsabil  — Khatma 💙.</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
